<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz cumpleaños Gabriel</title>

<style>
body {
  margin: 0;
  background: #2f3e55;
  color: white;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

/* estrellas */
.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('https://i.imgur.com/8Km9tLL.png');
  animation: moveStars 60s linear infinite;
  opacity: 0.4;
}

@keyframes moveStars {
  from {background-position: 0 0;}
  to {background-position: 1000px 1000px;}
}

/* título */
.title {
  text-align: center;
  font-size: 3em;
  margin-top: 40px;
  font-family: cursive;
}

/* pastel */
.cake {
  width: 200px;
  margin: 40px auto;
  position: relative;
}

.layer {
  background: #1f2a44;
  height: 50px;
  border-radius: 10px;
  margin-top: 10px;
  box-shadow: 0 0 15px rgba(255,255,255,0.1);
}

.candle {
  width: 10px;
  height: 30px;
  background: white;
  margin: auto;
  position: relative;
}

.flame {
  width: 10px;
  height: 10px;
  background: gold;
  border-radius: 50%;
  position: absolute;
  top: -10px;
  left: 0;
  animation: flicker 0.5s infinite alternate;
}

@keyframes flicker {
  from {transform: scale(1);}
  to {transform: scale(1.2);}
}

/* texto */
.message {
  text-align: center;
  max-width: 500px;
  margin: auto;
  font-style: italic;
  opacity: 0.9;
}

/* botón */
.button {
  position: absolute;
  bottom: 30px;
  right: 30px;
  background: #a7c7e7;
  color: black;
  padding: 12px 20px;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.3s;
}

.button:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="title">Feliz cumpleaños Gabriel</div>

<div class="cake">
  <div class="candle">
    <div class="flame"></div>
  </div>
  <div class="layer"></div>
  <div class="layer"></div>
  <div class="layer"></div>
</div>

<div class="message">
Hoy es tu día, te deseo todo lo mejor porque te lo mereces,
esto no es mucho pero créeme que lo hago con todo mi cariño.
Te quiero demasiado.<br><br>
Feliz cumpleaños mi niño Gabriel 💗
</div>

<div class="button" onclick="alert('Aquí irá el menú')">
Comenzar
</div>

</body>
</html>
